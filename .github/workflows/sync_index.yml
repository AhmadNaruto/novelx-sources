name: Sync index.yaml

on:
  push:
    branches: [main]
    paths:
      - "**/*.lua"   # любая .lua в любой папке языка
  workflow_dispatch: # ручной запуск из UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/sync_index.py .

      - name: Commit & push updated index.yaml
        run: |
          git diff --quiet && exit 0
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add "index.yaml" "*/index.yaml"
          git commit -m "chore: sync index.yaml [skip ci]"
          git push

      # jsDelivr кэш сбрасывается автоматически скриптом sync_index.py,
      # но на случай если надо сбросить вручную — можно раскомментировать:
