name: Sync index.yaml

on:
  push:
    branches: [main]
    paths:
      - "**/*.lua"   # любая .lua в любой папке языка
  workflow_dispatch: # ручной запуск из UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/sync_index.py .

      - name: Commit & push updated index.yaml
        run: |
          git diff --quiet && exit 0
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add "index.yaml" "*/index.yaml"
          git commit -m "chore: sync index.yaml [skip ci]"
          git push

      - name: Purge jsDelivr cache
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import urllib.request, os
          repo = os.environ["GITHUB_REPOSITORY"]
          base = f"https://purge.jsdelivr.net/gh/{repo}@main"

          # Собираем все пути из языковых папок + корневой индекс
          import pathlib, re
          root = pathlib.Path(".")
          skip = {".git", ".github", "scripts", "icons"}
          paths = ["index.yaml"]
          for d in sorted(root.iterdir()):
              if not d.is_dir() or d.name in skip or d.name.startswith("."):
                  continue
              if any(d.glob("*.lua")):
                  paths.append(f"{d.name}/index.yaml")
                  for lua in sorted(d.glob("*.lua")):
                      paths.append(f"{d.name}/{lua.name}")

          for path in paths:
              url = f"{base}/{path}"
              try:
                  with urllib.request.urlopen(url, timeout=15) as r:
                      print(f"  [purge] {path} → HTTP {r.status}")
              except Exception as e:
                  print(f"  [purge] {path} → ошибка: {e}")
          EOF
